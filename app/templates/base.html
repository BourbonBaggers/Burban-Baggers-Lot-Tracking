<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Burban Baggers Lot Tracking{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  </head>
  <body>
    <header class="site-header">
      <div>
        <a class="site-title" href="{{ url_for('main.index') }}">Burban Baggers Lot Tracking</a>
        <p class="site-subtitle">Internal batch, lot, and QC records</p>
      </div>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ url_for('main.batch_list') }}">Batches</a>
        <a href="{{ url_for('main.new_batch') }}">New Batch</a>
        <a href="{{ url_for('main.checkpoint_list') }}">Checkpoints</a>
        <a href="{{ url_for('main.product_list') }}">Products</a>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
