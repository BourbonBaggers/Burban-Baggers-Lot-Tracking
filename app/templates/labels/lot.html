<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Label - {{ batch.lot_number }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  </head>
  <body class="label-page">
    <main class="label-sheet">
      <section class="round-label">
        {% if batch.product.barcode_png_path %}
          <img src="{{ url_for('static', filename=batch.product.barcode_png_path) }}" alt="">
        {% else %}
          <span>No product barcode configured</span>
        {% endif %}
        <strong>LOT {{ batch.lot_number }}</strong>
        <small>EXP {{ expiration_date }}</small>
      </section>
    </main>
    <div class="label-actions">
      <button type="button" onclick="window.print()">Print</button>
      <a class="button" href="{{ url_for('main.batch_detail', lot_number=batch.lot_number) }}">Back to Batch</a>
    </div>
  </body>
</html>
